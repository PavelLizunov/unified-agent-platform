all:
  vars:
    ansible_user: uap
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    tailscale_manage: false
  children:
    linux_nodes:
      children:
        k3s_servers:
        k3s_agents:
    k3s_servers:
      hosts:
        uap-home-1:
          ansible_host: 100.106.223.120
          lan_ip: 192.168.0.201
          k3s_node_name: uap-home-1
          k3s_cluster_init: true
          tailnet_ip: 100.106.223.120
          tailnet_name: uap-home-1.tail9fd337.ts.net
          min_memory_mb: 2048
          min_cpu_count: 1
    k3s_agents:
      hosts:
        uap-home-2:
          ansible_host: 100.94.228.67
          lan_ip: 192.168.0.202
          k3s_node_name: uap-home-2
          tailnet_ip: 100.94.228.67
          tailnet_name: uap-home-2.tail9fd337.ts.net
          min_memory_mb: 1024
          min_cpu_count: 1
