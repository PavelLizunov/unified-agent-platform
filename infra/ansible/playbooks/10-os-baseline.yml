- name: Configure OS baseline
  hosts: linux_nodes
  gather_facts: true
  become: true
  handlers:
    - name: restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted
  tasks:
    - name: Install baseline packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - iproute2
          - openssh-server
          - qemu-guest-agent
          - sudo
        state: present
        update_cache: true

    - name: Enable qemu guest agent when present
      ansible.builtin.service:
        name: qemu-guest-agent
        enabled: true
        state: started

    - name: Disable SSH password auth
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?\s*PasswordAuthentication\s+'
        line: PasswordAuthentication no
        validate: /usr/sbin/sshd -t -f %s
      notify: restart ssh

    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?\s*PermitRootLogin\s+'
        line: PermitRootLogin no
        validate: /usr/sbin/sshd -t -f %s
      notify: restart ssh
