apiVersion: v1
kind: Secret
metadata:
  name: k3s-etcd-snapshot-s3-config
  namespace: kube-system
type: etcd.k3s.cattle.io/s3-config-secret
stringData:
  etcd-s3-endpoint: https://s3.example.com
  etcd-s3-bucket: uap-k3s-snapshots
  etcd-s3-folder: prod
  etcd-s3-region: us-east-1
  etcd-s3-access-key: REPLACE_WITH_ACCESS_KEY
  etcd-s3-secret-key: REPLACE_WITH_SECRET_KEY
  etcd-s3-skip-ssl-verify: "false"
  etcd-s3-insecure: "false"
  etcd-s3-timeout: 5m
