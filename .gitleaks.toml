title = "UAP gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "SOPS-encrypted-at-rest files + documented placeholders are committed by design"
paths = [
  '''clusters/.*\.sops\.ya?ml$''',
  '''infra/.*\.sops\.ya?ml$''',
  '''.*\.example$''',
  '''.*\.example\..*$''',
  '''.*\.template\..*$''',
]
regexes = [
  '''-----BEGIN AGE ENCRYPTED FILE-----''',
  '''ENC\[AES256_GCM''',
  # documented placeholders, never real secrets (e.g. staging garage.yaml rpc_secret/admin_token)
  '''REPLACE_WITH[A-Z0-9_]*''',
  '''CHANGEME''',
  '''<[A-Za-z0-9_-]+>''',
]

[[rules]]
id = "generic-api-key"

  [[rules.allowlists]]
  description = "Completion evidence stores a one-way source identity digest, not a credential"
  condition = "AND"
  regexTarget = "line"
  paths = ['''^docs/evidence/completion/[^/]+\.json$''']
  regexes = ['''^\s*"source_key_sha256"\s*:\s*"[0-9a-f]{64}"\s*,?\s*$''']
