# Stage 3 (REVIEW ONLY — see README.md; do NOT apply until subfleet is deployed + creds seeded).
# LiteLLM gateway in front of subfleet.
#
# Backend = the subfleet *bridge* (ONE in-cluster OpenAI-compatible endpoint). subfleet routes by
# model prefix to the Claude (and, after subfleet Phase C, Codex) subscription and handles RU egress
# itself — so LiteLLM needs NO proxy for this hop (it is a ClusterIP call). Per subfleet's integration
# delta: same 4 claude models + one image, plus optional reasoning_effort (extended thinking) and
# 429 backpressure (BRIDGE_MAX_CONCURRENT). All cloud groups share one api_base + one key
# (subfleet BRIDGE_SECRET); only the model id differs. Codex groups are additive (commented until #2/#3).
apiVersion: v1
kind: Secret
metadata:
  name: litellm-keys
  namespace: uap-system
type: Opaque
stringData:
  SUBFLEET_KEY: "REPLACE_WITH_SOPS"        # = subfleet BRIDGE_SECRET (Bearer to the bridge)
  LITELLM_MASTER_KEY: "REPLACE_WITH_SOPS"  # sk-... clients -> LiteLLM
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: uap-system
data:
  config.yaml: |
    model_list:
      # --- Claude via subfleet (live once subfleet is deployed + credentials.json seeded) ---
      - model_name: smart-cloud            # reasoning-on Opus for hard agent tasks
        litellm_params:
          model: openai/claude-opus-4-8
          api_base: http://subfleet-bridge.uap-system.svc:18902/v1   # VALIDATE release/ns DNS
          api_key: os.environ/SUBFLEET_KEY
          extra_body: { reasoning_effort: high }   # subfleet enables Claude extended thinking
      - model_name: balanced-cloud
        litellm_params:
          model: openai/claude-sonnet-4-6
          api_base: http://subfleet-bridge.uap-system.svc:18902/v1
          api_key: os.environ/SUBFLEET_KEY
      - model_name: cheap-cloud
        litellm_params:
          model: openai/claude-haiku-4-5
          api_base: http://subfleet-bridge.uap-system.svc:18902/v1
          api_key: os.environ/SUBFLEET_KEY
      # --- Codex via subfleet — PENDING subfleet Phase C (#2/#3); additive, SAME bridge ---
      # - model_name: cloud-fallback
      #   litellm_params:
      #     model: openai/<codex-or-gpt-id subfleet advertises>
      #     api_base: http://subfleet-bridge.uap-system.svc:18902/v1
      #     api_key: os.environ/SUBFLEET_KEY
      # --- Local overflow / used when the subscription is rate-limited or down ---
      - model_name: cheap-local
        litellm_params:
          model: ollama/qwen2.5:7b                 # VALIDATE owner Ollama model
          api_base: http://OWNER_OLLAMA_TAILNET_IP:11434
    litellm_settings:
      num_retries: 3            # subfleet returns 429 + Retry-After when over BRIDGE_MAX_CONCURRENT
      request_timeout: 600
      # Forward reasoning_effort; subfleet silently ignores temp/top_p/stop in its default mode.
      # Do NOT set subfleet UNSUPPORTED_PARAMS_MODE=enforce while LiteLLM may forward those.
      drop_params: false
    router_settings:
      routing_strategy: simple-shuffle
      fallbacks:
        - smart-cloud: ["balanced-cloud", "cheap-local"]
        - balanced-cloud: ["cheap-local"]
      allowed_fails: 2
      cooldown_time: 30
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: uap-system
spec:
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: uap-system
spec:
  replicas: 1   # Stage 3-FULL: 2 (with Postgres-backed keys/spend)
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:v1.89.0   # VALIDATE current stable before apply
          args: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: litellm-keys
          # No HTTPS_PROXY: LiteLLM only talks to the in-cluster subfleet bridge and the
          # tailnet Ollama. subfleet owns the upstream egress (PROXY_URL / CLI_HTTPS_PROXY).
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: litellm-config
