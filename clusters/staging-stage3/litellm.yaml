# Stage 3 (REVIEW ONLY — see README.md; do NOT apply until backend + key Secrets exist).
# LiteLLM gateway (LITE: single replica, no Postgres).
#
# Backends are OpenAI-COMPATIBLE endpoints backed by a Claude Code / Codex *subscription session*
# (NOT raw Anthropic/OpenAI API keys). So each cloud group is an `openai/<model>` provider with a
# custom api_base. The endpoint itself handles the upstream auth + egress; LiteLLM only needs to
# reach the endpoint (tailnet/LAN = direct; remote+RU-blocked = via singbox-egress).
#
# The Secret below is a PLACEHOLDER; real values are a SOPS Secret at promotion.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-keys
  namespace: uap-system
type: Opaque
stringData:
  # Bearer/api_key each endpoint expects (use "sk-noauth" if the endpoint needs none).
  SMART_CLOUD_KEY: "REPLACE_WITH_SOPS"      # Claude Code session endpoint
  CLOUD_FALLBACK_KEY: "REPLACE_WITH_SOPS"   # Codex session endpoint
  LITELLM_MASTER_KEY: "REPLACE_WITH_SOPS"   # sk-... proxy auth (clients -> LiteLLM)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: uap-system
data:
  config.yaml: |
    model_list:
      # Claude Code subscription session, exposed as an OpenAI-compatible endpoint.
      - model_name: smart-cloud
        litellm_params:
          model: openai/CLAUDE_ENDPOINT_MODEL_NAME   # VALIDATE: the model id the endpoint exposes
          api_base: CLAUDE_ENDPOINT_URL              # tailnet/LAN (direct) or remote (see README egress)
          api_key: os.environ/SMART_CLOUD_KEY
      # Codex subscription session, OpenAI-compatible.
      - model_name: cloud-fallback
        litellm_params:
          model: openai/CODEX_ENDPOINT_MODEL_NAME
          api_base: CODEX_ENDPOINT_URL
          api_key: os.environ/CLOUD_FALLBACK_KEY
      # Local overflow / used when the subscription sessions are rate-limited or down.
      - model_name: cheap-local
        litellm_params:
          model: ollama/qwen2.5:7b                    # VALIDATE owner Ollama model
          api_base: http://OWNER_OLLAMA_TAILNET_IP:11434
    litellm_settings:
      drop_params: true        # subscription endpoints may not accept every OpenAI param
      num_retries: 3           # subscription rate-limits -> retry before falling back
      request_timeout: 600
    router_settings:
      routing_strategy: simple-shuffle
      # On rate-limit/session-expiry, fall through to the next backend.
      fallbacks:
        - smart-cloud: ["cloud-fallback", "cheap-local"]
        - cloud-fallback: ["cheap-local"]
      allowed_fails: 2
      cooldown_time: 30
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: uap-system
spec:
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: uap-system
spec:
  replicas: 1   # Stage 3-FULL: 2 (with Postgres-backed keys/spend)
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:v1.89.0   # VALIDATE current stable before apply
          args: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: litellm-keys
          env:
            # Egress is only needed if the subscription endpoints are REMOTE and RU-blocked.
            # tailnet/LAN endpoints already bypass via NO_PROXY (100.64.0.0/10) and need no proxy.
            # If a backend is remote+blocked, point HTTPS_PROXY at the in-cluster sing-box and
            # REMOVE that host from NO_PROXY. If all backends are tailnet/local, delete these vars.
            - name: HTTPS_PROXY
              value: "http://singbox-egress.uap-system.svc:12080"
            - name: HTTP_PROXY
              value: "http://singbox-egress.uap-system.svc:12080"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.svc,.cluster.local,10.0.0.0/8,100.64.0.0/10"
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: litellm-config
