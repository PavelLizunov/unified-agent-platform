# Stage 3 (REVIEW ONLY — see README.md + runbooks/subfleet-integration.md; do NOT apply yet).
# Flux deploy of subfleet (the model backend) wrapping its Helm chart deploy/helm/claude2api.
# Values verified against subfleet/deploy/helm/claude2api/values.yaml.
#
# Supply chain (architecturally-correct): subfleet CI builds + pushes images to GHCR on a v* tag;
# k3s pulls them by pinned ref with a read:packages imagePullSecret. No manual ctr-import.
#
# PROMOTE GATE (all must hold before moving this to clusters/prod/infra + applying):
#   [x] images published to GHCR by subfleet CI on tag v0.2.0 (rust + leak-scan + publish all green)
#   [ ] pin images by DIGEST (resolve `ghcr.io/<owner>/subfleet-*@sha256:...` once the PAT exists)
#   [ ] ghcr-pull imagePullSecret (read:packages PAT) — SOPS
#   [ ] subfleet-secrets SOPS Secret (bridgeSecret, adminToken, credentials.json)
#   [ ] credentials.json seeded via scripts/login.sh THROUGH the single egress exit (IP-pin)
#   [ ] singbox-egress pins ONE fixed VLESS exit (NOT urltest) — same exit as setup-token
#   [ ] token-service stays single-writer (replicas:1 + Recreate / file backend)
#   [ ] read-only Flux deploy key for the subfleet repo exists (subfleet-git-auth, SOPS)
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: subfleet
  namespace: flux-system
spec:
  interval: 1h
  url: ssh://git@github.com/REPLACE_OWNER/subfleet.git   # private; needs read-only deploy key
  ref:
    tag: v0.2.0                                           # immutable release ref (matches the images)
  secretRef:
    name: subfleet-git-auth                               # SOPS-managed read-only deploy key
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: subfleet
  namespace: uap-system
spec:
  interval: 30m
  releaseName: subfleet                # -> Service `subfleet-bridge` (matches litellm.yaml api_base)
  targetNamespace: uap-system
  chart:
    spec:
      chart: deploy/helm/claude2api
      sourceRef:
        kind: GitRepository
        name: subfleet
        namespace: flux-system
  values:
    # read:packages pull secret for the private GHCR packages (SOPS Secret below).
    imagePullSecrets:
      - name: ghcr-pull
    image:
      bridge:
        repository: ghcr.io/REPLACE_OWNER_LC/subfleet-bridge   # lowercase owner; pin by @digest at promote
        tag: "v0.2.0"
        pullPolicy: IfNotPresent
      tokenService:
        repository: ghcr.io/REPLACE_OWNER_LC/subfleet-token
        tag: "v0.2.0"
        pullPolicy: IfNotPresent
    secrets:
      existingSecret: subfleet-secrets         # keys: bridgeSecret, adminToken
    bridge:
      replicaCount: 2
      # egress for the spawned claude CLI — the SAME single exit as token-service refresh (IP-pin)
      cliProxy: http://singbox-egress.uap-system.svc:12080
      extraEnv:
        - name: BRIDGE_MAX_CONCURRENT       # size to the subscription tier; excess -> 429
          value: "8"
        - name: UNSUPPORTED_PARAMS_MODE     # leave ignore/warn (LiteLLM may forward temp/max_tokens)
          value: "warn"
        - name: EXTENDED_THINKING_MAX_BUDGET
          value: "32768"
    tokenService:
      replicas: 1                          # single-writer (file backend)
      proxyUrl: http://singbox-egress.uap-system.svc:12080   # refresh egress — same exit as cliProxy
      store:
        backend: file
    providers:
      claude:
        enabled: true
        bootstrapExistingSecret: subfleet-secrets   # key: credentials.json (seeded via setup-token)
      codex:
        enabled: false                     # PENDING subfleet Phase C (#2/#3)
---
# REVIEW-ONLY placeholders. At promote these become SOPS-encrypted Secrets under clusters/prod/infra
# (NOT plaintext). credentials.json comes from scripts/login.sh run through the egress exit.
apiVersion: v1
kind: Secret
metadata:
  name: subfleet-secrets
  namespace: uap-system
type: Opaque
stringData:
  bridgeSecret: "REPLACE_WITH_SOPS"        # = LiteLLM SUBFLEET_KEY; openssl rand -hex 24
  adminToken: "REPLACE_WITH_SOPS"          # openssl rand -hex 24
  credentials.json: "REPLACE_WITH_SOPS"    # {access_token, refresh_token} from claude setup-token
---
# GHCR pull secret (read:packages PAT). At promote: SOPS-encrypted dockerconfigjson.
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull
  namespace: uap-system
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: "REPLACE_WITH_SOPS"   # {\"auths\":{\"ghcr.io\":{\"auth\":\"<base64 user:read-pkgs-PAT>\"}}}
