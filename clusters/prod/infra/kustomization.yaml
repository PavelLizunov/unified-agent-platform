apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
  - k3s-etcd-snapshot-s3-config.sops.yaml
  # subfleet (model backend) — phase 1: egress + bridge/token-service
  - subfleet-git-auth.sops.yaml
  - ghcr-pull.sops.yaml
  - subfleet-secrets.sops.yaml
  - singbox-egress-config.sops.yaml
  - subfleet-egress.yaml
  # HA egress for hermes-agent (urltest auto-failover); separate from subfleet's IP-pinned egress
  - singbox-egress-ha-config.sops.yaml
  - singbox-egress-ha.yaml
  - subfleet.yaml
  - litellm-keys.sops.yaml
  - litellm.yaml
  - hermes-keys.sops.yaml
  - hermes-code-configmap.yaml
  - hermes.yaml
  # hermes-agent (Track A2) — external NousResearch agent, brain = Codex (codex_app_server)
  - codex-auth.sops.yaml
  - hermes-agent-telegram.sops.yaml     # A3 — Telegram bot token
  - hermes-agent-dashboard.sops.yaml    # web dashboard basic-auth password
  - hermes-agent-api.sops.yaml           # central Workspace API bearer key
  - hermes-agent-mission.sops.yaml       # build-1 mission producer credential
  - hermes-agent-owner.sops.yaml         # Workspace-only owner-answer capability
  - hermes-agent-claude.sops.yaml       # A4 - Claude Max OAuth token for the claude -p coding worker
  - hermes-mission-runtime.yaml          # generated pinned A6 mission overlay
  - hermes-agent-config.yaml
  - hermes-agent.yaml
  - hermes-agent-backup-r2.sops.yaml    # PR B - R2 rclone creds for the DR backup CronJob
  - hermes-agent-backup.yaml            # PR B - daily PVC backup to R2
