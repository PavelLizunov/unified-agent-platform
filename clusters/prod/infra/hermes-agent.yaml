# hermes-agent — NousResearch hermes-agent gateway (Track A2). Brain = Codex
# (codex_app_server, owner's ChatGPT Plus OAuth) reached through the in-cluster
# singbox-egress. Official image nousresearch/hermes-agent:latest (Docker Hub —
# reachable from RU). State (config, SQLite, skills, memories, codex + hermes auth)
# lives on a local-path PVC at /opt/data. The container starts as root; the image's
# s6 /init drops services to uid 10000 (hermes). Full proven recipe + verify steps:
# runbooks/hermes-agent-codex-brain.md.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-agent-data
  namespace: uap-system
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: uap-system
spec:
  replicas: 1
  strategy:
    type: Recreate          # single-writer SQLite/auth state on one PVC — never two pods
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
      annotations:
        hermes-agent/config-rev: "v7-claude-worker"   # bump on EVERY ConfigMap change to roll the pod (subPath mounts don't auto-update)
    spec:
      # local-path PVC is node-local; pin to the designated always-on worker.
      nodeSelector:
        kubernetes.io/hostname: uap-home-2
      securityContext:
        fsGroup: 10000        # PVC group-owned by hermes so the uid-10000 services can write
      initContainers:
        - name: bootstrap
          image: nousresearch/hermes-agent:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # 1) coding CLIs onto the PVC (land in /opt/data/.local/bin, already on the image PATH)
              export npm_config_prefix=/opt/data/.local
              if [ ! -x /opt/data/.local/bin/codex ]; then
                npm i -g @openai/codex
              fi
              if [ ! -x /opt/data/.local/bin/claude ]; then
                npm i -g @anthropic-ai/claude-code
              fi
              # 2) Soft config + codex sandbox config from the ConfigMap, SEED-IF-ABSENT so the
              #    dashboard/CLI can own them on the PVC across restarts. The BRAIN is pinned
              #    separately by the managed overlay /etc/hermes/config.yaml, which always wins.
              [ -f /opt/data/config.yaml ] || cp /config/config.yaml /opt/data/config.yaml
              mkdir -p /opt/data/.codex
              [ -f /opt/data/.codex/config.toml ] || cp /config/codex-config.toml /opt/data/.codex/config.toml
              # 2a) claude -p worker: seed deny-first settings (defense-in-depth vs accidental secret reads;
              #     Bash is unconstrained, so the pod itself is the real boundary)
              mkdir -p /opt/data/.claude
              [ -f /opt/data/.claude/settings.json ] || cp /config/claude-settings /opt/data/.claude/settings.json
              # 2b) Fail CLOSED on a broken brain overlay: the brain lives ONLY in the managed
              #     overlay now (no PVC fallback on a fresh volume), and the managed loader is
              #     fail-OPEN, so a malformed overlay would silently un-pin the brain. Abort the boot
              #     (visible CrashLoop) instead. /config/managed-config = the bytes the gateway
              #     mounts at /etc/hermes/config.yaml.
              /opt/hermes/.venv/bin/python -c 'import yaml,sys; d=yaml.safe_load(open("/config/managed-config")) or {}; sys.exit("FATAL: managed brain overlay missing model.provider") if not d.get("model",{}).get("provider") else None'
              # 3) seed Codex creds ONCE — after first boot hermes refreshes its own
              #    /opt/data/auth.json, so never clobber it (single-use refresh tokens).
              if [ ! -f /opt/data/auth.json ]; then
                cp /seed/auth.json /opt/data/.codex/auth.json
                HOME=/opt/data CODEX_HOME=/opt/data/.codex /opt/hermes/.venv/bin/python -c \
                  'import sys; from hermes_cli.auth import _import_codex_cli_tokens, _save_codex_tokens; t=_import_codex_cli_tokens(); sys.exit("codex token import failed (expired/invalid seed?)") if not t else _save_codex_tokens(t)'
              fi
              # 3b) Telegram bot token -> user .env (hermes reads it as self.config.token).
              #     Proxy + allowlist are NOT here — they go in the managed scope
              #     (/etc/hermes/.env) so they reach the isolated per-profile os.environ.
              # The bot token is GitOps-owned (seeded from the SOPS secret, ROTATABLE by rolling
              # the pod). Replace ONLY its line each boot; PRESERVE all OTHER .env lines the
              # dashboard writes (Discord/MCP tokens, /sethome chat-IDs) so they survive restarts.
              touch /opt/data/.env
              grep -v '^TELEGRAM_BOT_TOKEN=' /opt/data/.env > /opt/data/.env.tmp || true
              printf 'TELEGRAM_BOT_TOKEN=%s\n' "$(cat /telegram/token)" >> /opt/data/.env.tmp
              mv /opt/data/.env.tmp /opt/data/.env
              chmod 600 /opt/data/.env
              # 3c) seed the user profile (memories/USER.md) once; the agent enriches it via chat
              mkdir -p /opt/data/memories
              [ -f /opt/data/memories/USER.md ] || cp /config/user-profile /opt/data/memories/USER.md
              # 4) ownership for the uid-10000 hermes services
              chown -R 10000:10000 /opt/data
          volumeMounts:
            - { name: data, mountPath: /opt/data }
            - { name: config, mountPath: /config, readOnly: true }
            - { name: codex-seed, mountPath: /seed, readOnly: true }
            - { name: telegram-seed, mountPath: /telegram, readOnly: true }
      containers:
        - name: gateway
          image: nousresearch/hermes-agent:latest
          args: ["gateway", "run"]
          env:
            - { name: HERMES_HOME, value: /opt/data }
            - { name: CODEX_HOME, value: /opt/data/.codex }
            # Codex CLI egress -> singbox-egress-ha (urltest failover) -> VLESS exit -> chatgpt.com (the proven path)
            - { name: HTTPS_PROXY, value: "http://singbox-egress-ha.uap-system.svc:12080" }
            - { name: HTTP_PROXY, value: "http://singbox-egress-ha.uap-system.svc:12080" }
            - { name: NO_PROXY, value: ".svc,.cluster.local,localhost,127.0.0.1,10.0.0.0/8,100.64.0.0/10" }
            - { name: HERMES_DISABLE_LAZY_INSTALLS, value: "1" }
            # Web dashboard (the "morda": config + sessions UI), over tailnet via the NodePort Service below.
            # Auth is mandatory (June 2026 hardening); basic auth, password from the SOPS secret.
            - { name: HERMES_DASHBOARD, value: "1" }
            - { name: HERMES_DASHBOARD_HOST, value: "0.0.0.0" }
            - { name: HERMES_DASHBOARD_PORT, value: "9119" }
            - { name: HERMES_DASHBOARD_BASIC_AUTH_USERNAME, value: "pavel" }
            - name: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
              valueFrom: { secretKeyRef: { name: hermes-agent-dashboard, key: password } }
            # A4 - Claude Max OAuth token for the claude -p coding worker (claude reads CLAUDE_CODE_OAUTH_TOKEN)
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom: { secretKeyRef: { name: hermes-agent-claude, key: oauth-token } }
          ports:
            - { name: dashboard, containerPort: 9119 }
          volumeMounts:
            - { name: data, mountPath: /opt/data }
            # managed scope: loaded LAST with override into os.environ, authoritative for
            # every profile + subprocess (codex spawn = os.environ.copy()). This is how the
            # Telegram adapter AND the gateway-driven codex brain reach the egress proxy —
            # the per-profile os.environ is isolated and does NOT see /opt/data/.env.
            - { name: config, mountPath: /etc/hermes/.env, subPath: managed-env, readOnly: true }
            # managed CONFIG overlay: pins the BRAIN (model.*) per-leaf OVER the PVC config.yaml.
            - { name: config, mountPath: /etc/hermes/config.yaml, subPath: managed-config, readOnly: true }
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits: { memory: 1536Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        - name: config
          configMap:
            name: hermes-agent-config
        - name: codex-seed
          secret:
            secretName: codex-auth
        - name: telegram-seed
          secret:
            secretName: hermes-agent-telegram
---
# Web dashboard over the tailnet. The cluster network runs on tailscale0 (ADR-021), so a
# tailscale-serve proxy can't reach a ClusterIP — use a NodePort (same pattern as Hermes-legacy
# :30890). Reach it at http://<any-node-tailnet-ip>:30911 with basic auth (user "pavel").
apiVersion: v1
kind: Service
metadata:
  name: hermes-agent-dashboard
  namespace: uap-system
spec:
  type: NodePort
  selector:
    app: hermes-agent
  ports:
    - name: dashboard
      port: 9119
      targetPort: 9119
      nodePort: 30911
