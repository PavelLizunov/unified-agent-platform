# hermes-agent PVC DR backup (PR B). The hermes-agent-data PVC is local-path, node-pinned to
# uap-home-2, reclaimPolicy was Delete, and is NOT covered by the etcd->R2 snapshots (those
# capture k8s API objects, never the hostPath bytes). A uap-home-2 disk loss would lose ALL
# earned state: sessions (state.db), the Codex brain (.codex/*.sqlite), kanban, cron, USER.md.
# This CronJob takes a daily FULL `hermes backup` (consistent sqlite snapshot, safe on the live
# pod) and ships it to R2. FULL, not --quick: --quick omits .codex/ = the Codex brain memory.
# Restore: see runbooks/hermes-agent-dr.md. The backup zip contains plaintext auth.json/.env
# (same exposure class as the etcd->R2 snapshots already in this bucket); harden via the
# bucket-scoped R2 key + optional client-side encryption follow-up noted in the runbook.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hermes-agent-backup
  namespace: uap-system
spec:
  schedule: "0 3 * * *"            # daily 03:00 (node-local time); matches the etcd snapshot cadence
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          # RWO local-path PVC lives on uap-home-2; a second reader pod must co-locate there.
          nodeSelector:
            kubernetes.io/hostname: uap-home-2
          securityContext:
            fsGroup: 10000              # shared by both containers -> 0640 zip handoff works without root-read
          initContainers:
            # 1) produce the FULL backup zip into a shared emptyDir (reads the PVC; no writes to it).
            - name: dump
              image: nousresearch/hermes-agent:latest
              command: ["/bin/sh", "-c"]
              securityContext:
                runAsUser: 0       # dump-container file ops as root (NOTE: hermes backup itself still drops to uid 10000)
              args:
                - |
                  set -eu
                  ts=$(date +%Y%m%d-%H%M%S)
                  zip="/work/hermes-backup-$ts.zip"
                  # FULL backup (NOT --quick — --quick omits .codex/, the Codex brain). hermes uses
                  # sqlite3.backup() for a consistent copy, so this is safe while the gateway runs.
                  # NOT piped (no `| tee`): a pipe hides hermes's exit code from `set -e`, so a non-zero
                  # `hermes backup` would slip through and we'd validate a partial zip. Redirect instead.
                  env HOME=/opt/data HERMES_HOME=/opt/data hermes backup -o "$zip" >/work/backup.log 2>&1
                  cat /work/backup.log
                  # NOTE: `hermes backup` drops to its service uid 10000 internally even though this
                  # container is root, so a few ROOT-owned, REGENERATABLE files (claude global config,
                  # .codex/config.toml seeded from the ConfigMap, stray demo session logs) get skipped.
                  # That is a WARNING, not a failure: the manifest check below guarantees the CRITICAL
                  # 10000-owned earned state (state.db, auth.json, .codex/*.sqlite) is captured, and
                  # FAILING the whole backup on those skips would leave NO backup -- strictly worse.
                  grep -qi "files skipped\|permission denied" /work/backup.log && echo "WARNING: skipped some regeneratable files (see log) -- non-fatal" || true
                  [ -s "$zip" ] || { echo "FATAL: backup zip missing/empty"; exit 1; }
                  # Integrity + manifest. HARD-fail on always-present earned state (a corrupt/partial zip can
                  # never pass as success); WARN-only on regeneratable files that may be legitimately absent
                  # on a fresh/recovering PVC, so a not-yet-warmed pod still gets its daily backup.
                  /opt/hermes/.venv/bin/python -c "import zipfile,sys,posixpath; z=zipfile.ZipFile(\"$zip\"); n=z.namelist(); sys.exit(\"FATAL: corrupt zip\") if z.testzip() else None; base={posixpath.basename(x) for x in n}; hard=[f for f in (\"state.db\",\"auth.json\") if f not in base]; sys.exit(\"FATAL: backup missing critical file(s): \"+\", \".join(hard)) if hard else None; soft=[f for f in (\".env\",) if f not in base]+([\".codex/*.sqlite\"] if not any(x.endswith(\".sqlite\") and \"/.codex/\" in \"/\"+x for x in n) else []); print(\"WARNING: backup missing (regeneratable): \"+\", \".join(soft), file=sys.stderr) if soft else None"
                  chmod 600 "$zip"          # root-owned; the ship container (rclone, root) reads it
                  rm -f /work/backup.log
                  ls -la /work
              env:
                - { name: HERMES_HOME, value: /opt/data }
              volumeMounts:
                - { name: data, mountPath: /opt/data }
                - { name: work, mountPath: /work }
              resources:
                requests: { cpu: 50m, memory: 256Mi }
                limits: { memory: 512Mi }
          containers:
            # 2) ship to R2 (direct to Cloudflare, NOT through the LLM egress proxy) + retention.
            - name: ship
              image: rclone/rclone:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  export RCLONE_CONFIG=/cfg/rclone.conf
                  DST="r2:uap-k3s-snapshots/hermes-agent-backup/"
                  # guard: never report success on an empty /work (would be a silent backup miss).
                  ls /work/hermes-backup-*.zip >/dev/null 2>&1 || { echo "FATAL: no backup zip in /work to ship"; exit 1; }
                  rclone copy /work "$DST" --include "hermes-backup-*.zip" --s3-no-check-bucket
                  # retention: keep the most recent 7 (busybox-safe; oldest sort to the top of the list).
                  keep=7
                  files=$(rclone lsf "$DST" | grep -E '^hermes-backup-.*\.zip$' | sort)
                  n=$(printf '%s\n' "$files" | grep -c . || true)
                  if [ "$n" -gt "$keep" ]; then
                    printf '%s\n' "$files" | head -n "$((n - keep))" | while IFS= read -r o; do
                      [ -n "$o" ] && { echo "retention: deleting $o"; rclone deletefile "$DST$o"; }
                    done
                  fi
                  echo "=== current backups in R2 ==="
                  rclone lsf "$DST" | grep -E '^hermes-backup-.*\.zip$' | sort || true
              volumeMounts:
                - { name: work, mountPath: /work }
                - { name: r2cfg, mountPath: /cfg, readOnly: true }
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { memory: 256Mi }
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: hermes-agent-data
            - name: work
              emptyDir: { sizeLimit: 2Gi }
            - name: r2cfg
              secret:
                secretName: hermes-agent-backup-r2
