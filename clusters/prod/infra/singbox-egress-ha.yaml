# HA LLM egress for hermes-agent (Codex brain + Telegram): VLESS+REALITY with urltest
# AUTO-FAILOVER across the owner's subscription servers (Germany/Iceland/Netherlands ...).
# urltest probes each server every 30s and routes the fastest LIVE one, migrating in-flight
# connections off a server that dies (interrupt_exist_connections).
#
# WHY a SEPARATE Service from `singbox-egress` (subfleet-egress.yaml): urltest ROTATES exit IPs,
# which would break subfleet's OAuth IP-pin (its static token was authorized through ONE exit IP;
# a refresh from a different IP 403s and can poison the credential -- see the warning in
# clusters/staging-stage3/singbox-egress.yaml). hermes-agent is NOT IP-pinned (Codex refreshes its
# own OAuth across IPs; Telegram is stateless), so it is safe behind a rotating egress and gets
# real failover. subfleet stays on the single-fixed `singbox-egress`.
#
# Config = SOPS Secret singbox-egress-ha-config (singbox-egress-ha-config.sops.yaml), regenerated
# from the subscription via infra/sops/gen-singbox-failover.py. See runbooks/llm-egress-vless.md.
apiVersion: v1
kind: Service
metadata:
  name: singbox-egress-ha
  namespace: uap-system
spec:
  type: NodePort              # LAN hosts (build VM) use <node-ip>:30880 as an HTTP proxy to reach the VLESS exit
  selector:
    app: singbox-egress-ha
  ports:
    - name: proxy
      port: 12080
      targetPort: 12080
      nodePort: 30880
---
# Dedicated no-permission ServiceAccount (2026-06-28 hardening): sing-box never calls the K8s API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: singbox-egress-ha
  namespace: uap-system
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: singbox-egress-ha
  namespace: uap-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: singbox-egress-ha
  template:
    metadata:
      labels:
        app: singbox-egress-ha
      annotations:
        singbox-egress-ha/config-rev: "v3-7servers"   # bump when regenerating the config secret so Flux rolls the pod (sing-box reads its config only at startup)
    spec:
      # Hardening (2026-06-28): sing-box is a userspace outbound proxy -- it needs no Linux caps and
      # never calls the K8s API. Drop the SA token + all caps + block priv-escalation + seccomp. Kept
      # as root (runAsNonRoot deferred: the upstream image's cache/ownership under a non-root uid is
      # unverified, and a broken egress pod takes the Codex brain + Telegram offline).
      automountServiceAccountToken: false
      serviceAccountName: singbox-egress-ha
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sing-box
          image: ghcr.io/sagernet/sing-box:v1.13.13
          args: ["run", "-c", "/etc/sing-box/config.json"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 12080
          # Probe (2026-06-28): a TCP connect to the proxy port confirms sing-box is actually listening
          # (Ready != merely process-running). config is read only at startup, so a small budget.
          startupProbe:
            tcpSocket: { port: 12080 }
            periodSeconds: 5
            failureThreshold: 12      # ~60s to come up
          readinessProbe:
            tcpSocket: { port: 12080 }
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket: { port: 12080 }
            periodSeconds: 20
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /etc/sing-box
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          secret:
            secretName: singbox-egress-ha-config
