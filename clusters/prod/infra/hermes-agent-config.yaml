# hermes-agent (Track A2) — non-secret config, mounted by the bootstrap initContainer.
#  - config.yaml      -> /opt/data/config.yaml (HERMES_HOME)
#  - codex-config.toml -> /opt/data/.codex/config.toml (CODEX_HOME)
# Brain = Codex (owner's ChatGPT Plus) via the codex_app_server runtime. WHY these exact
# values is proven + explained in runbooks/hermes-agent-codex-brain.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
  namespace: uap-system
data:
  config.yaml: |
    # Brain: the Codex subprocess (codex_app_server) owns the tool loop. The default
    # codex_responses mode does NOT work in-cluster — hermes's Python httpx cannot reach
    # chatgpt.com through the singbox proxy ("Connection error"); the codex CLI (Rust) can.
    # NB: the BRAIN (model.*) is intentionally NOT here -- it is pinned by the managed overlay
    # /etc/hermes/config.yaml (the `managed-config` key below), which deep-merges per-leaf and
    # always wins, so dashboard/CLI edits to it are refused loudly. This file is SOFT config only.
    agent:
      tool_use_enforcement: auto
    display:
      language: ru
    # set these explicitly (not null) to silence the tui_gateway "empty section" warning; generous for a single user
    max_concurrent_sessions: 20
    context_file_max_chars: 200000
  codex-config.toml: |
    # codex's own bubblewrap sandbox cannot initialise in the restricted container
    # (no user namespaces) -> writes fail with "sandbox permission error". The pod
    # itself is the security boundary, so disable codex's sandbox.
    sandbox_mode = "danger-full-access"
    approval_policy = "never"

    [mcp_servers.build1]
    command = "/opt/hermes/.venv/bin/python"
    args = ["/opt/data/mcp/build1_mcp.py"]
  # claude -p worker settings -> seeded to /opt/data/.claude/settings.json. Deny-first rules are
  # DEFENSE-IN-DEPTH against ACCIDENTAL secret reads (e.g. a task that greps config files), NOT an
  # exfil boundary: Bash is unconstrained, so the POD is the real boundary and the worker is the
  # owner's own claude. Absolute (//) specs cover the in-pod auth stores; ./ specs cover the cloned repo.
  claude-settings: |
    {
      "permissions": {
        "deny": [
          "Read(//opt/data/auth.json)",
          "Read(//opt/data/.codex/auth.json)",
          "Read(//opt/data/.claude/.credentials.json)",
          "Read(//opt/data/.env)",
          "Read(./**/*.sops.yaml)",
          "Edit(./**/*.sops.yaml)",
          "Read(./**/.env)",
          "Read(./**/age-key.txt)"
        ]
      }
    }
  # Managed CONFIG overlay -> /etc/hermes/config.yaml. hermes deep-merges this OVER the user
  # (PVC) config.yaml, winning PER-LEAF, and refuses dashboard/CLI writes to these keys with a
  # loud "managed by your administrator". Keeps the BRAIN GitOps-owned while the dashboard owns
  # every other (soft) config key. Proof + verify: runbooks/hermes-agent-codex-brain.md.
  managed-config: |
    model:
      provider: openai-codex
      openai_runtime: codex_app_server
      model: gpt-5.5
  # Managed scope — mounted at /etc/hermes/.env. hermes loads this LAST with override into
  # os.environ, authoritative for every profile + subprocess. Required because the per-profile
  # os.environ is isolated (multiplex mode) and does NOT see /opt/data/.env, so the Telegram
  # adapter's resolve_proxy_url and the codex spawn (os.environ.copy()) only get the egress
  # proxy from here. api.telegram.org is blocked direct from the cluster -> proxy is mandatory.
  managed-env: |
    HTTPS_PROXY=http://singbox-egress-ha.uap-system.svc:12080
    HTTP_PROXY=http://singbox-egress-ha.uap-system.svc:12080
    NO_PROXY=.svc,.cluster.local,localhost,127.0.0.1,10.0.0.0/8,100.64.0.0/10
    TELEGRAM_ALLOWED_USERS=729937253
    # NB: do NOT set HERMES_TELEGRAM_DISABLE_FALLBACK_IPS=1 — tried it, Telegram got flakier (the
    # fallback IPs add redundant connection targets through the proxy). The occasional reconnects are
    # egress-stability noise; they self-heal and Telegram re-delivers queued updates, so no message loss.
  # Seed user profile (memories/USER.md) — initContainer writes it only if absent; the
  # agent enriches it over time via conversation (memory.user_profile_enabled: true).
  user-profile: |
    # Профиль владельца
    - Оператор/владелец платформы unified-agent-platform (UAP).
    - Язык: русский. Стиль: кратко — результат + следующий шаг, без воды.
    - Рабочий поток — вайб-кодинг: даёт идеи и инфраструктуру; код НЕ ревьюит,
      поэтому агент обязан САМ тестировать (самопроверка = гейт качества).
    - Инфраструктура: k3s (Flux GitOps + SOPS); мозг = Codex (ChatGPT Plus) через
      egress-прокси (хост в РФ — прямой доступ к OpenAI/Anthropic закрыт).

    ## Флот и где что делать
    ### ЖЁСТКОЕ ПРАВИЛО: вся работа с кодом — ТОЛЬКО на build-1
    Клонирование репо, правки кода, `claude -p`, `git`, `gh`, сборки — ВСЕГДА через
    `/opt/data/.local/bin/build1 "..."`. НИКОГДА не клонируй и не редактируй репозитории в ЭТОМ поде
    (cwd `/opt/hermes`): здесь НЕТ git-токена (push не сработает) и всё ЭФЕМЕРНО (слетит при рестарте).
    Клонируй в `~/` на build-1, дальше каждый вызов = `build1 "cd ~/<repo> && <команды>"` (каждый build1 —
    отдельная ssh-сессия, поэтому `cd` в репо в каждом вызове).

    - **uap-build-1** (8 ядер / 16 GB; tailnet 100.85.56.31 / LAN 192.168.0.99) — выделенная build/dev-машина.
      Достучаться из этого пода командой-обёрткой (используй АБСОЛЮТНЫЙ путь — короткого `build1` может не быть
      в PATH bash-тула): `/opt/data/.local/bin/build1 "<команда>"` (например `/opt/data/.local/bin/build1 "hostname"`).
      ВАЖНО: прямой `ssh uap-build-1` НЕ работает (ssh ищет конфиг в /root/.ssh, а ключ+конфиг в /opt/data/.ssh);
      обёртка = `ssh -F /opt/data/.ssh/config uap-build-1`.
      На ней стоят claude-code (claude -p) и rust/cargo, есть egress наружу через VLESS-прокси.
      ВАЖНО: тяжёлый кодинг и сборки гоняй ТАМ (8 ядер), а не в этом крошечном поде (2 ядра).
      Кодинг на ней: `/opt/data/.local/bin/build1 "cd <repo> && CLAUDE_CODE_OAUTH_TOKEN=$(cat ~/.claude-oauth-token) claude -p '<задача>' --permission-mode acceptEdits"`
      Сборка: `/opt/data/.local/bin/build1 "cd <repo> && cargo build"`
      **GitHub на build-1 настроен** (git+gh, авторизован как PavelLizunov, доступ ко ВСЕМ репо). В самом поде
      токена НЕТ by design — вся работа с git/PR идёт ЧЕРЕЗ build1. Полный цикл:
      `/opt/data/.local/bin/build1 "cd ~/ && git clone https://github.com/<owner>/<repo> && cd <repo> && git checkout -b <ветка>"`
      → правки через `claude -p` → `... git add -A && git commit -m '...' && git push -u origin <ветка> && gh pr create --fill"`
      → статус CI: `gh pr checks <N>` → мёрж по зелёному: `gh pr merge --auto --squash <N>`.
    - Остальной флот: uap-home-1 (k3s server+etcd), этот под = uap-home-2 (k3s agent), uap-ops-1 (git push + kubectl),
      desktop (GPU, не всегда включён). Все на tailnet (100.x).
    - Egress наружу (Anthropic/OpenAI/crates.io/github) — только через VLESS-прокси (хост в РФ, прямой доступ закрыт).

    ## Гигиена контекста (ВАЖНО — был инцидент: 564K токенов за один промт)
    - НЕ грепай и не ищи по своему исходнику `/opt/hermes` — это огромный монорепо, поиск возвращает
      мегабайты (file:line дампы) и мгновенно переполняет контекст. Именно это раздуло сессию до 564K.
    - Для «что настроено / статус / конфиг» используй `hermes status`, `hermes doctor`, `hermes config show`,
      `cat /opt/data/config.yaml` — а НЕ рекурсивный поиск по коду.
    - Любой поиск/чтение — узко: конкретные файлы, `--max-count`, `head`, а не рекурсия по большим деревьям.
    - Тяжёлое исследование/сборку кода гоняй на build-1 (`/opt/data/.local/bin/build1 "..."`), не тащи
      большой вывод обратно в чат — возвращай только итог.
  build1-mcp: |
    #!/usr/bin/env python3
    """MCP server exposing build-1 coding tools to the codex brain.

    Registered via /opt/data/.codex/config.toml [mcp_servers.build1]. Makes `claude -p`
    on build-1 a FIRST-CLASS codex tool so the model picks it by schema instead of
    substituting its own apply_patch. See runbooks/claude-routing-goal.md (R1).
    """
    import subprocess
    import shlex
    from mcp.server.fastmcp import FastMCP

    mcp = FastMCP("build1")

    # ssh -F /opt/data/.ssh/config resolves the uap-build-1 alias + key (durable, root-owned /root/.ssh too).
    SSH = [
        "ssh", "-F", "/opt/data/.ssh/config",
        "-o", "BatchMode=yes", "-o", "ConnectTimeout=10", "uap-build-1",
    ]


    def _run(remote_cmd: str, timeout: int = 900) -> str:
        try:
            r = subprocess.run(
                SSH + [remote_cmd],
                capture_output=True, text=True, timeout=timeout,
            )
            out = r.stdout or ""
            if r.stderr and r.stderr.strip():
                out += "\n[stderr]\n" + r.stderr
            return ("[exit %d]\n%s" % (r.returncode, out)).strip()
        except subprocess.TimeoutExpired:
            return "[timeout after %ds]" % timeout


    @mcp.tool()
    def claude_code(repo: str, task: str, extra_args: str = "") -> str:
        """Delegate a code change to Claude Code running on the build host (build-1, 8 cores).

        ALWAYS use this for ANY repository code edit, and WHENEVER the user mentions
        'claude' / 'клод'. Do NOT edit repository files yourself with apply_patch or
        shell -- those run in the tiny 2-core pod without the git token and cannot reach GitHub.

        repo: absolute path of the repo on build-1 (e.g. /home/uap/vpnctl).
        task: the natural-language instruction for Claude Code.
        extra_args: optional extra flags for `claude` (e.g. "--max-turns 20").
        """
        cmd = "cd %s && claude -p %s --permission-mode acceptEdits --output-format json %s" % (
            shlex.quote(repo), shlex.quote(task), extra_args,
        )
        return _run(cmd)


    @mcp.tool()
    def build1_shell(command: str, workdir: str = "") -> str:
        """Run a shell command on the build host (build-1, 8 cores) where repos, the git
        token, gh, and rust/cargo live. Use for git/gh/cargo/build/test on repositories.

        command: the shell command. workdir: optional absolute path to cd into first.
        """
        cmd = command if not workdir else "cd %s && %s" % (shlex.quote(workdir), command)
        return _run(cmd)


    if __name__ == "__main__":
        mcp.run()
  agents-md: |
    # Operating rules (codex brain)

    - You run in a tiny 2-core orchestration pod. Repository CODE and BUILDS live on the
      build host **build-1** (8 cores), which has the git token, gh, and rust/cargo.
    - **NEVER edit repository files locally** — not with `apply_patch`, not with shell.
      Your local edits are allowed ONLY under `/opt/data` (your own skills / config / memory).
    - For **ANY repository code change**, use the **`claude_code`** tool (it runs Claude Code
      on build-1). Do not reproduce its work yourself with apply_patch.
    - If the user mentions **"claude" / "клод"**, you MUST use the **`claude_code`** tool.
    - For **git / gh / cargo / build / test** on a repo, use the **`build1_shell`** tool.
    - The git token lives ONLY on build-1 — edits/commits/pushes done anywhere else cannot
      reach GitHub, and the pod is ephemeral (2 cores). Route all repo work to build-1.
