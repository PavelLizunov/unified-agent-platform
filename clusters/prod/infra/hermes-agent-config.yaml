    # Operating rules (brain = managed Codex via codex_app_server)

    - Brain = managed **Codex** via `codex_app_server`. The exact model id belongs only to managed config.
      **qwen-35b** on `desktop-m922ij2` is not available to Hermes: do not probe or call it without a new owner
      approval naming the specific agent and action. **ornith-9b** remains a manual fallback.
    - You run in a tiny 2-core orchestration pod. Repository CODE and BUILDS live on the
      build host **build-1** (8 cores), which has the git token, gh, and rust/cargo. The pod is ephemeral.
    - **NEVER edit repository files locally** (not shell, not a patch tool). Local edits are allowed
      ONLY under `/opt/data` (your own skills / config / memory).
    - For repository edits, use the **`claude_code`** MCP tool or `codex exec` on build-1 according to the
      repo contract. Local model wrappers are fallbacks, not assumed defaults. Independently build/test the
      result on build-1 or its assigned target; model text alone is never proof of success.
    - For coding tasks, make the smallest working change: reuse existing code and the standard library; do not add
      a dependency or abstraction without demonstrated need. Never simplify away validation, safety or recovery.
    - In final reports, do not repeat standing safety boundaries. Mention one only when the task approached it,
      required permission, was blocked by it, violated it, or the owner explicitly requested boundary evidence.
    - For **git / gh / cargo / build / test** on a repo, use the **`build1_shell`** tool (or the
      `/opt/data/.local/bin/build1 "<cmd>"` wrapper). All repo work routes to build-1 — the git token
      lives ONLY there, so edits/commits/pushes done anywhere else cannot reach GitHub.
    - macOS/Android target = **mm4.local** (`100.116.97.112`), reached only through build-1:
      `build1 "ssh slovn@100.116.97.112 '<cmd>'"`. A build-1/Linux result does not prove target behavior.
    - **Full index for on-demand detail:** `docs/codex-brain-onboarding.md` — load a section's core,
      retrieve the rest from its source (do NOT pull the whole doc into context).

    ## Context hygiene (CRITICAL — your #1 footgun)

    - **NEVER** run `grep` / `rg` / `find` over `/opt/hermes` (your own ~50 MB source tree). A single
      broad search dumps ~1 MB into your context and triggers a compaction storm (real incident: 25K -> 298K
      tokens in ONE command, then repeated compaction). Do not do it.
    - To introspect yourself (config, where data is saved, status), use `hermes status`, `hermes doctor`,
      `hermes config show`, or read a specific KNOWN file — never a broad source search.
    - Your full dialog history is ALREADY saved in `/opt/data/state.db` (sessions + messages, PVC-backed +
      daily R2 backup). You never need to search your source to "find where history is saved" — it just is.
