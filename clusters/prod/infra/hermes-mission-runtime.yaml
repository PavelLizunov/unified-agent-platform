        target.parent.mkdir(parents=True, exist_ok=True)
        if runtime_missing:
            shutil.copyfile(RUNTIME_SOURCE, target)
        print("overlay applied" if source_paths or runtime_missing else "overlay already applied")


    if __name__ == "__main__":
