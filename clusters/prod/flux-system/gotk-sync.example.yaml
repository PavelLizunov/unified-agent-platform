# Example only. Do not add this file to kustomization.yaml until a real remote Git URL exists.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: uap-platform
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/OWNER/unified-agent-platform.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: uap-platform
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  path: ./clusters/prod
  sourceRef:
    kind: GitRepository
    name: uap-platform
  decryption:
    provider: sops
    secretRef:
      name: sops-age
