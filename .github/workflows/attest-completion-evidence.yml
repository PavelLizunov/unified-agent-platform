name: attest-completion-evidence

on:
  push:
    branches: [master]
    paths:
      - 'docs/evidence/completion/*.json'
      - 'docs/evidence/onboarding/*.json'

permissions: {}

jobs:
  attest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4
      - name: Verify completion evidence
        run: |
          for bundle in docs/evidence/completion/*.json; do
            python3 tools/swarm/flow_contract.py verify-completion-evidence --bundle "$bundle"
          done
          for bundle in docs/evidence/onboarding/*.json; do
            python3 tools/swarm/flow_contract.py verify-project-onboarding-evidence \
              --bundle "$bundle" --completion-root docs/evidence/completion
          done
      - name: Attest completion evidence
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4
        with:
          subject-path: |
            docs/evidence/completion/*.json
            docs/evidence/onboarding/*.json
